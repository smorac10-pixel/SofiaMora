<header>

    <main>

<div id="contenedor">

    <div id = "contenedor">

        <div class="espacio">
            <h3>Precio Total Con Iva</h3>

                <label for="Precio">Ingresa el precio sin Iva:</label>
                <br>
                <input type="text" id="Precio" placeholder="Precio sin Iva">
                <br>
                <label for="Iva">Ingresa el Iva (%):</label>
                <input type="text" id="Iva" placeholder="Iva (%)">
                <br>
                <button onclick="PrecioConIva()">Calcular</button>
                <br>
                <label for="resultado">El precio con Iva es:</label>
                <input type="text" id="resultado" readonly>        
        </div>


        <div class ="espacio"> 
            <h3>Area y Perimetro</h3>

            <label for="Lado">Ingresa el lado del cuadrado:</label>
            <br>
            <input type ="text" id ="Lado" placeholder="Lado del cuadrado">
            <br>
            <button onclick="calcularAreayperimetro()">CalcularÁreayPerímetro</button>
            <br>
            <label for="area">El area es:</label>
            <input type ="text" id="area" placeholder="Area del cuadrado" readonly>
            <br>
            <label for="perimetro">El perímetro es:</label>
            <input type ="text" id="perimetro" placeholder="Perímetro del cuadrado" readonly>
        </div>


        <div class ="espacio"> 
            <h3>Decenas y unidades </h3>

            <label for="Numero">Ingresa un número:</label>
            <br>
            <input type ="text" id ="Numero" placeholder="Número">
            <br>
            <button onclick="DecenasYUnidades()">Calcular</button>
            <br>
            <label for="decenas">Las decenas son:</label>
            <input type ="text" id="decenas" placeholder="Decenas" readonly>
            <br>
            <label for="unidades">Las unidades son:</label>
            <input type ="text" id="unidades" placeholder="Unidades" readonly>
        </div>


        <div class ="espacio">
             <h3>Calcular Ingredientes</h3>
            <label for="Personas">Ingresa el número de personas:</label>
            <br>                
            <input type ="text" id ="Personas" placeholder="Número de personas">
            <br>
            <button onclick="CalcularIngredientes()">Calcular</button>
            <br>
            <label for="patatas">Patatas:</label>
            <input type ="text" id="patatas" placeholder="gramos de patatas" readonly>
            <br>
            <label for ="huevos">Huevos:</label>
            <input type ="text" id="huevos" placeholder="cantidad de huevos" readonly>
            <br>
            <label for ="cebolla">Cebolla:</label>
            <input type ="text" id="cebolla" placeholder="gramos de cebolla" readonly>
            
            </div>


        <div class ="espacio"> Espacio 5</div>
        <div class ="espacio"> Espacio 6</div>
        <div class ="espacio"> Espacio 7</div>
        <div class ="espacio"> Espacio 8</div>
        <div class ="espacio"> Espacio 9</div>
        <div class ="espacio"> Espacio 10</div>
        <div class ="espacio"> Espacio 11</div>
        <div class ="espacio"> Espacio 12</div> 
        <div class ="espacio"> Espacio 13</div>
        <div class ="espacio"> Espacio 14</div>
        <div class ="espacio"> Espacio 15</div>






    </div>
